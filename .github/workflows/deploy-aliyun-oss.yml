name: Deploy to Alibaba Cloud OSS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
      OSS_REGION: ${{ secrets.ALIYUN_OSS_REGION }}
      OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
      OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ossutil
        run: |
          curl -fsSLo ossutil.zip https://gosspublic.alicdn.com/ossutil/v2/2.3.0/ossutil-2.3.0-linux-amd64.zip
          unzip -q ossutil.zip
          sudo mv ossutil-2.3.0-linux-amd64/ossutil /usr/local/bin/ossutil
          sudo chmod +x /usr/local/bin/ossutil

      - name: Prepare publish directory
        run: |
          rm -rf publish
          mkdir -p publish
          cp -a frontend/prototype/. publish/

      - name: Configure OSS static website
        run: |
          cat > website.xml <<'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <WebsiteConfiguration>
            <IndexDocument>
              <Suffix>index.html</Suffix>
            </IndexDocument>
            <ErrorDocument>
              <Key>index.html</Key>
              <HttpStatus>200</HttpStatus>
            </ErrorDocument>
          </WebsiteConfiguration>
          XML
          ossutil website --method put "oss://${OSS_BUCKET}" website.xml \
            -i "${OSS_ACCESS_KEY_ID}" \
            -k "${OSS_ACCESS_KEY_SECRET}" \
            --region "${OSS_REGION}"

      - name: Sync site files
        run: |
          ossutil rm "oss://${OSS_BUCKET}/" -r -f \
            -i "${OSS_ACCESS_KEY_ID}" \
            -k "${OSS_ACCESS_KEY_SECRET}" \
            --region "${OSS_REGION}"
          ossutil sync publish/ "oss://${OSS_BUCKET}/" \
            -i "${OSS_ACCESS_KEY_ID}" \
            -k "${OSS_ACCESS_KEY_SECRET}" \
            --region "${OSS_REGION}"
